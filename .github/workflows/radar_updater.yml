name: Fetch Latest Met.hu Radar

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

# This explicitly tells 

# GitHub

# to allow the bot to save files
permissions:
  contents: write

jobs:
  update-image:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: pip install requests beautifulsoup4

    - name: Run the updater script
      run: python update_radar.py

    - name: Commit and push the updated image back to GitHub
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add latest_radar.png
        git commit -m "Update radar image to latest" || exit 0
        git push origin main
        
