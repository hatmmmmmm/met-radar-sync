name: Fetch Latest Met.hu Radar

on:
  schedule:
    # 1. DAYTIME PHASE: Run every 60 minutes between 05:00 and 16:59 Hungarian Local Time (03:00 to 14:59 UTC)
    - cron: '0 3-14 * * *'

    # 2. EVENING PHASE: Run every 15 minutes between 17:00 and 22:59 Hungarian Local Time (15:00 to 20:59 UTC)
    - cron: '*/15 15-20 * * *'
    
    # 3. NIGHTTIME / QUIET PHASE: 23:00 to 05:00 Local (21:00 to 03:00 UTC) is skipped entirely.

  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-image:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4
      with:
        fetch-depth: 1 # Pulls only the latest commit to prevent tree mismatches

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: pip install requests beautifulsoup4

    - name: Run the updater script
      run: python update_radar.py

    - name: Auto-Commit and Push File Changes
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Forced update of weather assets and XML payload from ODP"
        file_pattern: 'latest_radar.png weather_data.xml'
        commit_options: '--no-verify'
        push_options: '--force' # Bypasses non-fast-forward push conflicts from parallel schedules
