name: Fetch Latest Met.hu Radar

on:
  schedule:
    # 1. DAYTIME PHASE: Run every 60 minutes between 05:00 and 16:59 Local (03:00 to 14:59 UTC)
    - cron: '0 3-14 * * *'

    # 2. EVENING PHASE: Run every 15 minutes between 17:00 and 22:59 Local (15:00 to 20:59 UTC)
    - cron: '*/15 15-20 * * *'
    
    # 3. NIGHTTIME / QUIET PHASE: 23:00 to 05:00 Local (21:00 to 03:00 UTC)
    # Mandated by skipping these hours entirely across both rules above.

  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-image:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # Automatically install requirements cleanly 
    - name: Install dependencies
      run: pip install requests beautifulsoup4

    # Run the exact code block to download the image bytes
    - name: Run the updater script
      run: python update_radar.py

    # Bypasses Exit Code 128 by routing file pushes through an official pre-authenticated module
    - name: Auto-Commit and Push File
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Update radar image to latest"
        file_pattern: 'latest_radar.png'
        
