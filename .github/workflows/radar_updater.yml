name: Fetch Latest Met.hu Radar

on:
  schedule:
    - cron: '0 3-14 * * *'
    - cron: '*/15 15-20 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-image:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: pip install requests beautifulsoup4

    - name: Run the updater script
      run: python update_radar.py

    # This pattern now checks for updates across both files safely
    - name: Auto-Commit and Push Files
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Update radar assets and XML data feeds"
        file_pattern: 'latest_radar.png weather_data.xml'
