name: Fetch Latest Met.hu Radar

on:
  schedule:
    # 1. DAYTIME PHASE: Run every 60 minutes between 05:00 and 16:59 Hungarian Local Time (03:00 to 14:59 UTC)
    - cron: '0 3-14 * * *'

    # 2. EVENING PHASE: Run every 15 minutes between 17:00 and 22:59 Hungarian Local Time (15:00 to 20:59 UTC)
    - cron: '*/15 15-20 * * *'
    
    # 3. NIGHTTIME / QUIET PHASE: 23:00 to 05:00 Local (21:00 to 03:00 UTC) is skipped entirely.

  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-image:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # --- THIS IS THE CRITICAL DEPENDENCY UPDATE BLOCK ---
    - name: Install dependencies
      run: pip install requests beautifulsoup4 pillow

    - name: Run the updater script
      run: python update_radar.py

    - name: Force Commit and Push Changes via Native Git
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # Track both the optimized high-contrast image and the scraped data
        git add latest_radar.png weather_data.json
        
        if git diff-index --quiet HEAD --; then
          echo "No changes detected. Skipping commit."
        else
          git commit -m "Updated high-contrast weather radar and forecast metrics"
          git push origin HEAD:main --force
        fi
